<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.hero-section {
  height: 100vh;
  background: url('./assets/images/transpotate.jpg') center/cover no-repeat;
  
  /* 🔥 IMPORTANT (parallax effect) */
  background-attachment: fixed;

  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* Red overlay */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(245, 197, 108, 0.466);
  top: 0;
  left: 0;
}

/* Content */
.hero-content {
  position: relative;
  color: white;
  z-index: 2;
  max-width: 800px;
}

.hero-content h4 {
  font-size: 18px;
  letter-spacing: 2px;
}

.hero-content h4 {
  font-size: 40px;
  margin: 10px 0;
}



.hero-content button {
  margin-top: 20px;
  padding: 12px 25px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
}
@media (max-width: 768px) {
  .hero-section {
    background-attachment: scroll;
  }
}
</style>
<body>
    
    <div class="hero-section">
  <div class="overlay"></div>

  <div class="hero-content">
    <h4>OUR GOAL</h4>
    <h3>The goal was to meet demand for a brand that combined both quality and style.Our team is committed to make and supply products that people don't just want but need.</h3>
  </div>
</div>
</body>
</html>
